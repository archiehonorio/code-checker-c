<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2BE Translation Code Checker</title>
<style>
:root {
  --bg:       #0b1220;
  --panel:    #071428;
  --muted:    #9aa9bf;
  --border:   rgba(255,255,255,0.07);
  --text:     #e6eef6;
  --err:      #ff7b72;
  --warn:     #f0c55e;
  --info:     #7dd3fc;
  --ok:       #66e07f;
  --brace:    #dcdcaa;
  --paren:    #c586c0;
  --bracket:  #4ec9b0;
  --err-bg:   rgba(255,123,114,0.10);
  --warn-bg:  rgba(240,197,94,0.10);
  --info-bg:  rgba(125,211,252,0.10);
}

* { box-sizing: border-box; }
body { margin:0; font-family:monospace; background:var(--bg); color:var(--text); display:flex; flex-direction:column; height:100vh; overflow:hidden; }

/* ── Header ── */
header { padding:10px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
header .title { font-size:15px; font-weight:bold; color:var(--info); letter-spacing:.5px; }
header .subtitle { font-size:11px; color:var(--muted); margin-top:2px; }

/* ── Layout ── */
.app { display:grid; grid-template-columns:460px 1fr; flex:1; gap:12px; padding:12px; min-height:0; overflow:hidden; }

/* ── Panels ── */
.panel { background:var(--panel); border-radius:10px; border:1px solid var(--border); display:flex; flex-direction:column; min-height:0; overflow:hidden; }
.panel-header { padding:8px 12px; border-bottom:1px solid var(--border); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; flex-shrink:0; display:flex; align-items:center; justify-content:space-between; }

/* ── Editor ── */
.editor-wrap { flex:1; display:flex; flex-direction:column; padding:8px; min-height:0; }
textarea { flex:1; resize:none; width:100%; padding:10px; border-radius:6px; border:1px solid var(--border); background:#010f20; color:var(--text); font-family:monospace; font-size:12.5px; line-height:1.5; outline:none; }
textarea:focus { border-color: rgba(125,211,252,0.35); }
.btn-row { display:flex; gap:8px; margin-top:8px; flex-shrink:0; }
button { padding:6px 14px; border-radius:6px; border:none; cursor:pointer; font-weight:bold; font-size:12px; }
.btn-run  { background:linear-gradient(180deg,#0ea5b7,#0b8b96); color:#fff; }
.btn-run:hover  { background:linear-gradient(180deg,#16b8cc,#0ea5b7); }
.btn-clear { background:rgba(255,255,255,0.08); color:var(--muted); }
.btn-clear:hover { background:rgba(255,255,255,0.13); }

/* ── Right panel ── */
.right { display:flex; flex-direction:column; }

/* ── Verdict bar ── */
#verdict-bar { padding:10px 14px; display:none; flex-shrink:0; border-bottom:1px solid var(--border); }
.verdict { display:inline-flex; align-items:center; gap:8px; padding:6px 14px; border-radius:20px; font-size:13px; font-weight:bold; }
.verdict-safe    { background:rgba(102,224,127,0.15); color:var(--ok);   border:1px solid rgba(102,224,127,0.3); }
.verdict-caution { background:rgba(240,197,94,0.15);  color:var(--warn); border:1px solid rgba(240,197,94,0.3); }
.verdict-risky   { background:rgba(255,123,114,0.15); color:var(--err);  border:1px solid rgba(255,123,114,0.3); }

.counts { display:flex; gap:10px; margin-top:8px; }
.count-badge { font-size:11px; padding:2px 10px; border-radius:10px; }
.count-err  { background:var(--err-bg);  color:var(--err);  border:1px solid rgba(255,123,114,0.3); }
.count-warn { background:var(--warn-bg); color:var(--warn); border:1px solid rgba(240,197,94,0.3); }
.count-info { background:var(--info-bg); color:var(--info); border:1px solid rgba(125,211,252,0.3); }
.count-ok   { background:rgba(102,224,127,0.08); color:var(--ok); border:1px solid rgba(102,224,127,0.25); }

/* ── Filter bar ── */
#filter-bar { padding:6px 12px; display:none; gap:6px; flex-shrink:0; border-bottom:1px solid var(--border); }
.flt { padding:3px 10px; border-radius:10px; border:1px solid var(--border); font-size:11px; cursor:pointer; background:transparent; color:var(--muted); }
.flt.active-err  { background:var(--err-bg);  color:var(--err);  border-color:rgba(255,123,114,0.4); }
.flt.active-warn { background:var(--warn-bg); color:var(--warn); border-color:rgba(240,197,94,0.4); }
.flt.active-info { background:var(--info-bg); color:var(--info); border-color:rgba(125,211,252,0.4); }
.flt.active-all  { background:rgba(255,255,255,0.08); color:var(--text); border-color:rgba(255,255,255,0.2); }

/* ── Results area (preview + issues side by side) ── */
.results-grid { flex:1; display:grid; grid-template-rows:1fr 1fr; min-height:0; overflow:hidden; }

/* ── Code preview ── */
.preview-wrap { border-bottom:1px solid var(--border); overflow:auto; padding:8px; }
.preview { font-family:monospace; font-size:12.5px; white-space:pre; }
.line { display:block; padding:1px 4px; }
.ln { display:inline-block; width:40px; color:var(--muted); user-select:none; }
.highlight { background:rgba(125,211,252,0.13); border-radius:3px; }

/* ── Issue list ── */
.issues-wrap { overflow:auto; padding:8px; }
.issue { border-left:3px solid; padding:8px 10px; margin-bottom:7px; border-radius:6px; }
.issue.sev-error      { border-color:var(--err);  background:var(--err-bg); }
.issue.sev-warning    { border-color:var(--warn); background:var(--warn-bg); }
.issue.sev-suggestion { border-color:var(--info); background:var(--info-bg); }
.issue.sev-ok         { border-color:var(--ok);   background:rgba(102,224,127,0.06); }

.issue-top { display:flex; align-items:baseline; gap:8px; margin-bottom:3px; }
.issue-badge { font-size:10px; padding:1px 6px; border-radius:8px; font-weight:bold; text-transform:uppercase; flex-shrink:0; }
.badge-error      { background:rgba(255,123,114,0.2); color:var(--err); }
.badge-warning    { background:rgba(240,197,94,0.2);  color:var(--warn); }
.badge-suggestion { background:rgba(125,211,252,0.2); color:var(--info); }

.issue-rule { font-size:10px; color:var(--muted); flex-shrink:0; }
.issue-type { font-size:12.5px; font-weight:bold; color:var(--text); }
.issue-meta { font-size:11px; color:var(--muted); margin-bottom:4px; }
.issue-snippet { font-family:monospace; font-size:11.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
.issue-detail { font-size:11.5px; color:#b0bec5; margin-top:4px; line-height:1.45; }
.btn-goto { margin-top:5px; padding:2px 9px; font-size:11px; border-radius:5px; background:rgba(255,255,255,0.07); color:var(--muted); border:1px solid var(--border); cursor:pointer; }
.btn-goto:hover { background:rgba(255,255,255,0.13); color:var(--text); }

.brace   { color:var(--brace);   font-weight:bold; }
.paren   { color:var(--paren);   font-weight:bold; }
.bracket { color:var(--bracket); font-weight:bold; }
</style>
</head>
<body>

<header>
  <div>
    <div class="title">B2BE Translation Code Checker</div>
    <div class="subtitle">Static analysis for translation code — validates against B2BE coding standards</div>
  </div>
</header>

<div class="app">

  <!-- Left: editor -->
  <div class="panel">
    <div class="panel-header">
      <span>Editor — paste Translation.cpp here</span>
    </div>
    <div class="editor-wrap">
      <textarea id="code" spellcheck="false" placeholder="// Paste your Translation.cpp code here, then click Run Checks"></textarea>
      <div class="btn-row">
        <button id="run"   class="btn-run">&#9654;  Run Checks</button>
        <button id="clear" class="btn-clear">Clear</button>
      </div>
    </div>
  </div>

  <!-- Right: results -->
  <div class="panel right">
    <div class="panel-header">
      <span>Results</span>
      <span id="issue-count" style="color:var(--muted);font-size:11px;"></span>
    </div>

    <!-- Verdict -->
    <div id="verdict-bar"></div>

    <!-- Filters -->
    <div id="filter-bar">
      <button class="flt active-all" data-filter="all">All</button>
      <button class="flt" data-filter="error">Errors</button>
      <button class="flt" data-filter="warning">Warnings</button>
      <button class="flt" data-filter="suggestion">Suggestions</button>
    </div>

    <!-- Preview + issues -->
    <div class="results-grid">
      <div class="preview-wrap">
        <div id="preview" class="preview"></div>
      </div>
      <div class="issues-wrap">
        <div id="issues"></div>
      </div>
    </div>
  </div>

</div>

<script src="core.js"></script>
<!-- existing validators -->
<script src="validators/validate_memory.js"></script>
<script src="validators/validate_array.js"></script>
<script src="validators/validate_sql.js"></script>
<script src="validators/validate_raise.js"></script>
<script src="validators/validate_multiple_raise.js"></script>
<script src="validators/validate_loop.js"></script>
<script src="validators/validate_tempdb.js"></script>
<script src="validators/validate_divzero.js"></script>
<script src="validators/validate_oldutils.js"></script>
<script src="validators/validate_deletefile.js"></script>
<!-- new validators -->
<script src="validators/validate_cout.js"></script>
<script src="validators/validate_string_empty.js"></script>
<script src="validators/validate_string_append.js"></script>
<script src="validators/validate_return_type.js"></script>
<script src="validators/validate_executenonquery.js"></script>
<script src="validators/validate_strstr.js"></script>
<script src="validators/validate_constructor.js"></script>
<script src="validators/validate_select_star.js"></script>
<script src="validators/validate_struct.js"></script>
<script src="validators/validate_setfill.js"></script>
<script src="validators/validate_tempfile.js"></script>
</body>
</html>
